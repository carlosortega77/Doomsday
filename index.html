r(--vermillion);\n  box-shadow: none;\n  font-weight: 400;\n  animation: bounceIn 0.4s;\n}\n.day-btn.correct::after { content: '◉'; color: var(--vermillion); margin-left: 8px; font-style: normal; font-size: 14px; }\n.day-btn.wrong {\n  background: none;\n  color: var(--ink-3);\n  border-color: var(--rule);\n  box-shadow: none;\n  text-decoration: line-through;\n  text-decoration-color: var(--vermillion);\n  animation: shake 0.3s;\n}\n.day-btn.reveal {\n  background: var(--vermillion-soft);\n  border-color: var(--rule);\n  color: var(--ink);\n  box-shadow: none;\n}\n.day-btn:disabled { cursor: default; }\n@keyframes bounceIn {\n  0% { transform: translateX(0); }\n  50% { transform: translateX(8px); }\n  100% { transform: translateX(0); }\n}\n@keyframes shake {\n  0%,100% { transform: translateX(0); }\n  25% { transform: translateX(-4px); }\n  75% { transform: translateX(4px); }\n}\n\n.drill-feedback {\n  font-family: 'Fraunces', serif;\n  font-style: italic;\n  font-weight: 300;\n  font-size: 18px;\n  margin: 22px 0;\n  min-height: 28px;\n  text-align: left;\n  color: var(--ink-2);\n}\n.drill-feedback.ok  { color: var(--vermillion); }\n.drill-feedback.err { color: var(--ink-2); }\n\n.streak-display {\n  display: flex;\n  justify-content: flex-start;\n  gap: 6px;\n  margin: 0 0 12px;\n  flex-wrap: wrap;\n  align-items: center;\n  min-height: 14px;\n}\n.streak-flame {\n  display: inline-block;\n  width: 6px; height: 6px;\n  background: var(--vermillion);\n  border-radius: 50%;\n  animation: none;\n}\n\n.btn-action {\n  background: none;\n  color: var(--ink);\n  border: 1px solid var(--ink);\n  padding: 14px 32px;\n  border-radius: 0;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  cursor: pointer;\n  font-weight: 500;\n  transition: all 0.18s ease;\n  margin-top: 18px;\n  box-shadow: none;\n}\n.btn-action:hover {\n  background: var(--ink); color: var(--paper);\n  transform: none; box-shadow: none;\n}\n.btn-action:active { transform: none; box-shadow: none; }\n\n.btn-secondary {\n  background: none;\n  color: var(--ink-3);\n  border: none;\n  border-bottom: 1px solid var(--rule);\n  padding: 6px 0;\n  border-radius: 0;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n  cursor: pointer;\n  margin: 0 18px 0 0;\n  font-weight: 400;\n}\n.btn-secondary:hover {\n  color: var(--ink);\n  border-bottom-color: var(--ink);\n  border-style: solid;\n}\n\n/* hint box */\n.hint-box {\n  display: none;\n  background: none;\n  border: none;\n  border-top: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule);\n  border-radius: 0;\n  padding: 18px 0;\n  margin: 24px 0;\n  max-width: 100%;\n  text-align: left;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 12px;\n  line-height: 1.85;\n  color: var(--ink-2);\n  font-weight: 400;\n}\n.hint-box .hl { color: var(--vermillion); font-weight: 500; }\n.hint-box strong { color: var(--ink); font-weight: 500; }\n<\u002Fstyle>\n<style>/* ═══════ STATS · KAKEMONO V2 ═══════ */\n.stats-grid { display: none; }\n.heat-banner { display: none; }\n\n.stats-kakemono {\n  text-align: center;\n  margin: 32px 0 24px;\n  padding: 24px 0 0;\n  position: relative;\n}\n.stats-kakemono .scroll-marker {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9px;\n  letter-spacing: 0.4em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n  margin-bottom: 26px;\n  font-weight: 400;\n}\n.stats-kakemono .pct-hero {\n  font-family: 'Fraunces', serif;\n  font-style: italic;\n  font-weight: 200;\n  font-size: clamp(96px, 22vw, 168px);\n  line-height: 0.9;\n  letter-spacing: -0.05em;\n  color: var(--ink);\n}\n.stats-kakemono .pct-hero .pct-symbol {\n  font-size: 0.45em;\n  color: var(--ink-3);\n  font-weight: 200;\n  margin-left: 4px;\n  vertical-align: 0.6em;\n}\n.stats-kakemono .pct-label {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9px;\n  letter-spacing: 0.4em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n  margin-top: 14px;\n  font-weight: 400;\n}\n\n.stats-metrics {\n  display: grid;\n  grid-template-columns: 1fr 1px 1fr 1px 1fr;\n  align-items: center;\n  gap: 18px;\n  margin: 26px auto 12px;\n  max-width: 480px;\n  border-top: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule);\n  padding: 22px 0;\n}\n.stats-metrics .m-rule {\n  width: 1px; height: 42px;\n  background: var(--rule);\n  justify-self: center;\n}\n.stats-metrics .m-cell { text-align: center; }\n.stats-metrics .m-val {\n  font-family: 'Fraunces', serif;\n  font-style: italic;\n  font-weight: 300;\n  font-size: 30px;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n.stats-metrics .m-val .unit {\n  font-size: 14px;\n  color: var(--ink-3);\n  margin-left: 2px;\n}\n.stats-metrics .m-lbl {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 8px;\n  color: var(--ink-3);\n  letter-spacing: 0.26em;\n  text-transform: uppercase;\n  margin-top: 6px;\n  font-weight: 400;\n}\n\n/* month ledger */\n.stats-ledger-title {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9px;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 400;\n  margin: 48px 0 18px;\n  text-align: left;\n  display: flex;\n  align-items: center;\n  gap: 14px;\n}\n.stats-ledger-title::before,\n.stats-ledger-title::after {\n  content: '';\n  flex: 1;\n  height: 1px;\n  background: var(--rule);\n}\n\n.stats-ledger {\n  margin: 18px 0 0;\n}\n.ledger-row {\n  display: grid;\n  grid-template-columns: 60px 1fr 56px;\n  gap: 18px;\n  align-items: center;\n  padding: 12px 0;\n  border-bottom: 1px solid var(--rule-soft);\n}\n.ledger-row:first-child { border-top: 1px solid var(--rule); }\n.ledger-row .l-month {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9.5px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 400;\n}\n.ledger-row .l-bar-wrap {\n  position: relative;\n  height: 8px;\n  display: flex;\n  align-items: center;\n}\n.ledger-row .l-bar-track {\n  position: absolute;\n  inset: 3.5px 0;\n  height: 1px;\n  background: var(--rule);\n}\n.ledger-row .l-bar {\n  position: relative;\n  height: 1px;\n  background: var(--ink);\n  z-index: 1;\n}\n.ledger-row.weak .l-bar { background: var(--vermillion); height: 2px; }\n.ledger-row .l-pct {\n  font-family: 'Fraunces', serif;\n  font-style: italic;\n  font-weight: 300;\n  font-size: 18px;\n  text-align: right;\n  color: var(--ink);\n  letter-spacing: -0.01em;\n}\n.ledger-row.weak .l-pct { color: var(--vermillion); }\n.ledger-row.empty .l-pct { color: var(--ink-3); }\n.ledger-row.empty .l-bar { background: var(--rule); }\n\n.stats-note {\n  font-family: 'Fraunces', serif;\n  font-style: italic;\n  font-weight: 300;\n  font-size: 16px;\n  color: var(--ink-2);\n  margin: 32px 0 0;\n  padding: 18px 0 0;\n  border-top: 1px solid var(--rule);\n  text-align: left;\n  max-width: 56ch;\n}\n.stats-note em {\n  color: var(--vermillion);\n  font-weight: 400;\n}\n\n/* ═══════ ENCY ═══════ */\n.ency-section { margin-bottom: 36px; }\n.ency-section h3 {\n  font-family: 'Fraunces', serif;\n  font-weight: 300;\n  font-size: 28px;\n  margin-bottom: 10px;\n  color: var(--ink);\n  letter-spacing: -0.02em;\n}\n.ency-section h3 em { font-style: italic; color: var(--vermillion); font-weight: 300; }\n.ref-table {\n  width: 100%;\n  border-collapse: collapse;\n  margin: 18px 0;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 12px;\n}\n.ref-table th, .ref-table td {\n  padding: 12px 14px;\n  text-align: left;\n  border-bottom: 1px solid var(--rule);\n}\n.ref-table th {\n  font-size: 9.5px;\n  text-transform: uppercase;\n  letter-spacing: 0.24em;\n  color: var(--ink-3);\n  font-weight: 500;\n  background: none;\n  border-bottom-color: var(--ink);\n}\n.ref-table td { color: var(--ink); font-weight: 400; }\n.ref-table tbody tr:hover td { background: var(--vermillion-soft); }\n\ndetails {\n  background: none;\n  border: none;\n  border-top: 1px solid var(--rule);\n  border-radius: 0;\n  padding: 16px 0;\n  margin: 0;\n}\ndetails:last-of-type { border-bottom: 1px solid var(--rule); }\ndetails summary {\n  cursor: pointer;\n  font-family: 'Fraunces', serif;\n  font-weight: 300;\n  font-size: 19px;\n  color: var(--ink);\n  list-style: none;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  letter-spacing: -0.01em;\n}\ndetails summary::after {\n  content: '+';\n  font-family: 'Fraunces', serif;\n  font-weight: 200;\n  font-size: 22px;\n  color: var(--vermillion);\n  transition: transform 0.2s;\n}\ndetails[open] summary::after { content: '−'; }\ndetails > *:not(summary) { margin-top: 18px; }\n\n/* toast */\n.toast {\n  position: fixed;\n  bottom: 28px; left: 50%;\n  transform: translateX(-50%) translateY(100px);\n  background: var(--ink);\n  color: var(--paper);\n  padding: 12px 22px;\n  border-radius: 0;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n  box-shadow: 0 8px 24px rgba(0,0,0,0.18);\n  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);\n  z-index: 1000;\n  max-width: 90vw;\n  text-align: center;\n  font-weight: 400;\n}\n.toast.show { transform: translateX(-50%) translateY(0); }\n.toast.success { background: var(--vermillion); color: var(--paper); }\n.toast.warn { background: var(--ink); color: var(--paper); }\n\n/* misc */\n.divider { height: 1px; background: var(--rule); margin: 28px 0; }\n.center { text-align: center; }\n.hidden { display: none !important; }\n\n/* family heading inside lessons */\n.lesson-family-h {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9.5px;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 500;\n  margin: 36px 0 14px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.lesson-family-h::before {\n  content: ''; width: 22px; height: 1px; background: var(--vermillion);\n}\n\n/* old heat-cell hidden */\n.month-heatmap, .heat-cell { display: none !important; }\n<\u002Fstyle>\n<style>/* ═══════ MOBILE TWEAKS — direcciones específicas por componente ═══════ */\n@media (max-width: 560px) {\n  /* Misión cards: less indented prose */\n  .mission p { padding-left: 38px; font-size: 15px; }\n  .mission-num { font-size: 18px; min-width: 30px; }\n  .mission-title { font-size: 22px; }\n  .mission-header { gap: 14px; }\n\n  /* Anchor grid: 2 columns on phones, 3 on tablets */\n  .anchor-grid {\n    grid-template-columns: repeat(2, 1fr);\n  }\n  .anchor-card {\n    padding: 18px 14px;\n    border-right: 1px solid var(--rule);\n  }\n  .anchor-card:nth-child(2n) { border-right: none; }\n  .anchor-card:nth-child(3n) { border-right: 1px solid var(--rule); }\n  .anchor-card:nth-child(2n) { border-right: none; }\n  .anchor-card .date { font-size: 44px; }\n\n  /* Wheel: smaller on mobile */\n  .doomsday-wheel { max-width: 280px; }\n\n  /* Drill stage */\n  .drill-stage { padding: 22px 0 18px; margin: 0 0 22px; }\n  .drill-date-eyebrow { font-size: 8.5px; margin-bottom: 12px; }\n  .drill-date { font-size: clamp(34px, 9vw, 52px); }\n  .timer { margin: 14px 0 0; }\n  .drill-mode-bar { gap: 14px; flex-wrap: wrap; padding: 10px 0; }\n  .mode-desc { font-size: 13px; padding-bottom: 12px; margin-bottom: 18px; }\n\n  /* Stats */\n  .stats-kakemono { padding: 16px 0 0; }\n  .stats-metrics { gap: 8px; padding: 18px 0; }\n  .stats-metrics .m-val { font-size: 24px; }\n  .stats-metrics .m-val .unit { font-size: 12px; }\n  .stats-metrics .m-rule { height: 32px; }\n  .stats-metrics .m-lbl { font-size: 7.5px; letter-spacing: 0.22em; }\n  .ledger-row { grid-template-columns: 44px 1fr 48px; gap: 12px; padding: 11px 0; }\n  .ledger-row .l-pct { font-size: 16px; }\n\n  /* Lesson titles */\n  .lesson-title { font-size: clamp(34px, 9vw, 52px); }\n  .prose { font-size: 17px; }\n\n  /* Hint box wider */\n  .hint-box { font-size: 11.5px; padding: 14px 0; }\n\n  /* Example block readable on phone */\n  .example-step { gap: 14px; font-size: 12px; }\n  .example-step .lhs { min-width: 90px; }\n\n  /* Reference table */\n  .ref-table th, .ref-table td { padding: 10px 8px; font-size: 11px; }\n\n  /* Tweaks panel: bottom-anchored sheet, full-width */\n  #tweaks-panel {\n    bottom: 12px !important;\n    right: 12px !important;\n    left: 12px !important;\n    min-width: 0 !important;\n    padding: 14px 16px !important;\n  }\n\n  /* Toast wider */\n  .toast { left: 12px; right: 12px; transform: translateY(100px); max-width: none; width: auto; }\n  .toast.show { transform: translateY(0); }\n}\n\n/* iOS safe-area: respeta el notch / home indicator */\n.app {\n  padding-left: max(28px, env(safe-area-inset-left));\n  padding-right: max(28px, env(safe-area-inset-right));\n  padding-bottom: max(120px, env(safe-area-inset-bottom));\n}\n@media (max-width: 560px) {\n  .app {\n    padding-left: max(18px, env(safe-area-inset-left));\n    padding-right: max(18px, env(safe-area-inset-right));\n    padding-bottom: max(110px, calc(env(safe-area-inset-bottom) + 90px));\n  }\n}\n\n/* iOS Safari: prevenir zoom auto en inputs (font-size >= 16px) */\n.wheel-controls input[type=number] { font-size: 22px; }\n@media (max-width: 560px) {\n  .wheel-controls input[type=number] { font-size: 18px; width: 92px; }\n  .wheel-controls .stepper { width: 36px; height: 36px; font-size: 18px; }\n  .wheel-controls { gap: 12px; }\n}\n\n/* Tap highlights más sutiles */\nbutton, a, .day-btn, .mission, .anchor-card, .tab, .mode-btn {\n  -webkit-tap-highlight-color: var(--vermillion-soft);\n  touch-action: manipulation;\n}<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n\n  <!-- TOP NAV -->\n  <div class=\"top-nav\">\n    <div class=\"brand\">\n      <span class=\"brand-dot\"><\u002Fspan>\n      <span>Doomsday <em>dojo<\u002Fem><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"level-badge\">\n      <span class=\"lv\" id=\"lv-badge\">N0<\u002Fspan>\n      <span id=\"xp-text\">0 xp<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TABS -->\n  <div class=\"tabs\">\n    <button class=\"tab active\" data-tab=\"path\">Camino<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"drill\">Dojo<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"stats\">Estado<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"ency\">Saberes<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ════════════════════════════════════════════════════\n       PANEL: CAMINO (mission path o lección activa)\n  ════════════════════════════════════════════════════ -->\n  <div id=\"panel-path\" class=\"panel active\">\n\n    <!-- MISSIONS LIST -->\n    <div id=\"mission-list\">\n      <div class=\"hero\">\n        <div class=\"dateline\">道場 · DOJO Nº I · ESTACIÓN UNO<\u002Fdiv>\n        <h1>El día <em>era<\u002Fem><br><span class=\"seal\">jueves<\u002Fspan>.<\u002Fh1>\n        <p>Una práctica para nombrar el día de cualquier fecha — sin calendario, sin titubeo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"path-intro\">\n        Un calendario perfecto vive ya en las matemáticas. Tu trabajo es <em>aprenderlo a través de los dedos<\u002Fem>, no de la lista. Cinco misiones, de cero a calendario humano.\n      <\u002Fdiv>\n\n      <div class=\"mission\" data-mission=\"1\" onclick=\"openLesson(1)\">\n        <div class=\"mission-header\">\n          <div class=\"mission-num\">1<\u002Fdiv>\n          <div class=\"mission-meta\">\n            <div class=\"mission-title\">El día ancla del año<\u002Fdiv>\n            <div class=\"mission-sub\">Misión I · 5 min · ⓛ teoría + ⓟ práctica<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p>Cierto día de la semana se repite por todo el año en fechas mágicas. Aprende a verlo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"mission\" data-mission=\"2\" onclick=\"openLesson(2)\">\n        <div class=\"mission-header\">\n          <div class=\"mission-num\">2<\u002Fdiv>\n          <div class=\"mission-meta\">\n            <div class=\"mission-title\">Las doce anclas del calendario<\u002Fdiv>\n            <div class=\"mission-sub\">Misión II · 8 min · 12 mnemónicos visuales<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p>Memoriza una fecha por mes con imágenes. Después, cualquier día está a un salto.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"mission\" data-mission=\"3\" onclick=\"openLesson(3)\">\n        <div class=\"mission-header\">\n          <div class=\"mission-num\">3<\u002Fdiv>\n          <div class=\"mission-meta\">\n            <div class=\"mission-title\">El año en cuatro pasos<\u002Fdiv>\n            <div class=\"mission-sub\">Misión III · 12 min · método clásico Conway<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p>Dada cualquier YY, calcula su Doomsday. Cuatro operaciones, una cadena mental.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"mission\" data-mission=\"4\" onclick=\"openLesson(4)\">\n        <div class=\"mission-header\">\n          <div class=\"mission-num\">4<\u002Fdiv>\n          <div class=\"mission-meta\">\n            <div class=\"mission-title\">Bisiestos y el tropiezo de enero<\u002Fdiv>\n            <div class=\"mission-sub\">Misión IV · 6 min · trucos de detección<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p>Aprende a detectar un bisiesto en un parpadeo y por qué solo importa para enero y febrero.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"mission\" data-mission=\"5\" onclick=\"openLesson(5)\">\n        <div class=\"mission-header\">\n          <div class=\"mission-num\">5<\u002Fdiv>\n          <div class=\"mission-meta\">\n            <div class=\"mission-title\">Atajos de maestro<\u002Fdiv>\n            <div class=\"mission-sub\">Misión V · 15 min · Odd+11 y décadas memorizadas<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p>Dos técnicas avanzadas que reducen el cálculo a segundos. Para pasar de calculador a oráculo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"divider\"><\u002Fdiv>\n\n      <div class=\"path-intro\" style=\"border-left-color:var(--accent-2)\">\n        ✦ Cuando completes las cinco misiones, el <em>Dojo<\u002Fem> queda abierto a fuego libre. Puedes practicar cualquier rango y modo cuantas veces quieras.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LESSON CONTAINER -->\n    <div id=\"lesson-view\" class=\"hidden\">\n      <button class=\"lesson-back\" onclick=\"closeLesson()\">← Volver al camino<\u002Fbutton>\n      <div id=\"lesson-content\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════════════════════════════════════════════════════\n       PANEL: DOJO (drill)\n  ════════════════════════════════════════════════════ -->\n  <div id=\"panel-drill\" class=\"panel\">\n    <div class=\"dateline\" style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--ink-3); letter-spacing:0.3em; text-transform:uppercase; margin-bottom:18px;\">道場 · PRÁCTICA LIBRE<\u002Fdiv>\n    <div class=\"lesson-title\">El <em>Dojo<\u002Fem><\u002Fdiv>\n    <div class=\"lesson-sub\">Practica · Mide · Domina<\u002Fdiv>\n\n    <div class=\"drill-mode-bar\">\n      <button class=\"mode-btn active\" data-mode=\"zen\">Zen<\u002Fbutton>\n      <button class=\"mode-btn\" data-mode=\"speed\">Speedrun<\u002Fbutton>\n      <button class=\"mode-btn\" data-mode=\"lives\">3 vidas<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"mode-desc\" id=\"mode-desc\">\n      <em>Sin reloj, sin penalización.<\u002Fem> El maestro practica hasta que la mano sabe sola.\n    <\u002Fdiv>\n\n    <div class=\"streak-display\" id=\"streak-display\"><\u002Fdiv>\n\n    <div class=\"drill-screen\">\n      <div class=\"drill-stage\">\n        <div class=\"drill-date-eyebrow\">Calcula el día de la semana<\u002Fdiv>\n        <div class=\"drill-date\" id=\"drill-date\">—<\u002Fdiv>\n        <div class=\"timer\" id=\"drill-timer\">&nbsp;<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"day-grid\" id=\"day-grid\"><\u002Fdiv>\n      <div class=\"drill-feedback\" id=\"drill-feedback\"><\u002Fdiv>\n\n      <div style=\"margin-top:8px\">\n        <button class=\"btn-secondary\" onclick=\"toggleHint()\">Pista<\u002Fbutton>\n        <button class=\"btn-secondary\" onclick=\"nextDrill()\">Saltar →<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"hint-box\" id=\"hint-box\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════════════════════════════════════════════════════\n       PANEL: STATS\n  ════════════════════════════════════════════════════ -->\n  <div id=\"panel-stats\" class=\"panel\">\n    <div class=\"stats-kakemono\">\n      <div class=\"scroll-marker\">— ESTADO · 状態 —<\u002Fdiv>\n      <div class=\"pct-hero\" id=\"st-pct\">—<span class=\"pct-symbol\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"pct-label\">Aciertos sobre el total<\u002Fdiv>\n      <div class=\"stats-metrics\">\n        <div class=\"m-cell\">\n          <div class=\"m-val\" id=\"st-correct\">0<\u002Fdiv>\n          <div class=\"m-lbl\">Aciertos<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"m-rule\"><\u002Fdiv>\n        <div class=\"m-cell\">\n          <div class=\"m-val\" id=\"st-streak\">0<\u002Fdiv>\n          <div class=\"m-lbl\">Racha<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"m-rule\"><\u002Fdiv>\n        <div class=\"m-cell\">\n          <div class=\"m-val\" id=\"st-time\">—<\u002Fdiv>\n          <div class=\"m-lbl\">Por fecha<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stats-ledger-title\">Mes a mes<\u002Fdiv>\n      <div class=\"stats-ledger\" id=\"ledger\"><\u002Fdiv>\n      <div class=\"stats-note\" id=\"stats-note\">\n        Donde la tinta se vuelve <em>bermellón<\u002Fem>, ahí está tu próximo entrenamiento.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"center\">\n      <button class=\"btn-secondary\" onclick=\"resetStats()\" style=\"margin-top:36px\">Reiniciar estadísticas<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════════════════════════════════════════════════════\n       PANEL: ENCICLOPEDIA\n  ════════════════════════════════════════════════════ -->\n  <div id=\"panel-ency\" class=\"panel\">\n    <div class=\"lesson-title\">Los <em>saberes<\u002Fem><\u002Fdiv>\n    <div class=\"lesson-sub\">Toda la teoría a tu alcance<\u002Fdiv>\n\n    <details open=\"\">\n      <summary>El método Doomsday — qué es y por qué funciona<\u002Fsummary>\n      <div class=\"prose\">\n        El matemático <strong>John Conway<\u002Fstrong> notó que dentro de cualquier año, ciertas fechas siempre caen en el mismo día de la semana. A ese día le llamó el <em class=\"hl\">Doomsday<\u002Fem> (\"día del juicio\") del año. Si conoces el Doomsday del año dado y la fecha ancla del mes, puedes saltar a cualquier día con una resta y un mod 7.\n      <\u002Fdiv>\n      <div class=\"prose\">\n        El método tiene <strong>tres componentes<\u002Fstrong>: ancla del siglo, clave del año, ancla del mes. Suma los tres con la diferencia al día buscado y aplica mod 7. Listo.\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Tabla 1 · Ancla del siglo<\u002Fsummary>\n      <table class=\"ref-table\">\n        <thead><tr><th>Siglo<\u002Fth><th>Rango<\u002Fth><th>Ancla<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>XIX<\u002Ftd><td>1800–1899<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>XX<\u002Ftd><td>1900–1999<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>XXI<\u002Ftd><td>2000–2099<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n          <tr><td>XXII<\u002Ftd><td>2100–2199<\u002Ftd><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <div class=\"prose\" style=\"font-size:15px\">Mnemónico: <em class=\"hl\">5 · 3 · 2 · 0<\u002Fem> repetido cada 400 años.<\u002Fdiv>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Tabla 2 · Anclas del mes (días Doomsday)<\u002Fsummary>\n      <table class=\"ref-table\">\n        <thead><tr><th>Mes<\u002Fth><th>Día ancla<\u002Fth><th>Mnemónico<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Enero<\u002Ftd><td>3 (4 si bisiesto)<\u002Ftd><td>El último cambia<\u002Ftd><\u002Ftr>\n          <tr><td>Febrero<\u002Ftd><td>28 (29 si bisiesto)<\u002Ftd><td>Último día de febrero<\u002Ftd><\u002Ftr>\n          <tr><td>Marzo<\u002Ftd><td>7, 14, 21 o 28<\u002Ftd><td>Múltiplos de 7<\u002Ftd><\u002Ftr>\n          <tr><td>Abril<\u002Ftd><td>4<\u002Ftd><td>4/4 cuadrado<\u002Ftd><\u002Ftr>\n          <tr><td>Mayo<\u002Ftd><td>9<\u002Ftd><td>9/5 — \"9 a 5\"<\u002Ftd><\u002Ftr>\n          <tr><td>Junio<\u002Ftd><td>6<\u002Ftd><td>6/6 cuadrado<\u002Ftd><\u002Ftr>\n          <tr><td>Julio<\u002Ftd><td>11<\u002Ftd><td>11/7 — 7-Eleven<\u002Ftd><\u002Ftr>\n          <tr><td>Agosto<\u002Ftd><td>8<\u002Ftd><td>8/8 cuadrado<\u002Ftd><\u002Ftr>\n          <tr><td>Septiembre<\u002Ftd><td>5<\u002Ftd><td>5/9 — \"9 a 5\"<\u002Ftd><\u002Ftr>\n          <tr><td>Octubre<\u002Ftd><td>10<\u002Ftd><td>10/10 cuadrado<\u002Ftd><\u002Ftr>\n          <tr><td>Noviembre<\u002Ftd><td>7<\u002Ftd><td>7/11 — 7-Eleven<\u002Ftd><\u002Ftr>\n          <tr><td>Diciembre<\u002Ftd><td>12<\u002Ftd><td>12/12 cuadrado<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Tabla 3 · Días de la semana<\u002Fsummary>\n      <table class=\"ref-table\">\n        <thead><tr><th>Resto mod 7<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n          <tr><td>1<\u002Ftd><td>Lunes<\u002Ftd><\u002Ftr>\n          <tr><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n          <tr><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n          <tr><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Algoritmo clásico de Conway (4 pasos)<\u002Fsummary>\n      <div class=\"prose\">Tomas YY (las dos últimas cifras del año), realizas estas cuatro operaciones, sumas todo con la ancla del siglo, y aplicas mod 7:<\u002Fdiv>\n      <div class=\"example\">\n        <div class=\"example-label\">Receta<\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">① YY ÷ 12<\u002Fspan><span class=\"rhs\">parte entera<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">② YY mod 12<\u002Fspan><span class=\"rhs\">resto de la división<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">③ ② ÷ 4<\u002Fspan><span class=\"rhs\">parte entera<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step final\"><span class=\"lhs\">Doomsday<\u002Fspan><span class=\"rhs\">(<b>siglo + ① + ② + ③<\u002Fb>) mod 7<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Algoritmo Odd+11 (atajo elegante)<\u002Fsummary>\n      <div class=\"prose\">Una variante que sustituye las divisiones por una regla repetida: <em class=\"hl\">\"si es impar, súmale 11\"<\u002Fem>.<\u002Fdiv>\n      <div class=\"example\">\n        <div class=\"example-label\">Tres pasos<\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">① YY<\u002Fspan><span class=\"rhs\">si impar, +11. Resultado A.<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">② A ÷ 2<\u002Fspan><span class=\"rhs\">si impar, +11. Resultado B.<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">③ C<\u002Fspan><span class=\"rhs\">= 7 − (B mod 7)<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step final\"><span class=\"lhs\">Doomsday<\u002Fspan><span class=\"rhs\">(<b>C + siglo<\u002Fb>) mod 7<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Detección rápida de bisiestos<\u002Fsummary>\n      <div class=\"prose\"><strong>Regla completa:<\u002Fstrong> bisiesto si divisible entre 4, salvo divisibles entre 100 que no sean también divisibles entre 400.<\u002Fdiv>\n      <div class=\"prose\"><strong>Atajo (1901–2099):<\u002Fstrong> ignora la excepción. Solo importa \"÷ 4\". El único año \"redondo\" del periodo es 2000, y es bisiesto.<\u002Fdiv>\n      <div class=\"prose\"><strong>Truco mental:<\u002Fstrong> mira la última cifra de YY:<\u002Fdiv>\n      <table class=\"ref-table\">\n        <thead><tr><th>Última cifra<\u002Fth><th>Penúltima par → bisiesto?<\u002Fth><th>Penúltima impar → bisiesto?<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>0, 4, 8<\u002Ftd><td>Sí<\u002Ftd><td>No<\u002Ftd><\u002Ftr>\n          <tr><td>2, 6<\u002Ftd><td>No<\u002Ftd><td>Sí<\u002Ftd><\u002Ftr>\n          <tr><td>1, 3, 5, 7, 9<\u002Ftd><td colspan=\"2\" style=\"text-align:center\">Nunca bisiesto<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <div class=\"prose\">⚠ <strong>Excepción<\u002Fstrong> en años redondos (terminan en 00): aplicar regla completa (÷400).<\u002Fdiv>\n    <\u002Fdetails>\n\n    <details>\n      <summary>Décadas memorizadas (siglos XIX, XX, XXI, XXII)<\u002Fsummary>\n      <div class=\"prose\"><strong>Cadencia de 12 años = +1 día Doomsday.<\u002Fstrong> Aplica a CUALQUIER siglo del calendario gregoriano: 12 años + 3 bisiestos = 15 días = +1 mod 7.<\u002Fdiv>\n      <div class=\"prose\"><strong>Bonus · ciclo de 400 años.<\u002Fstrong> El calendario se repite exacto cada 400 años (146.097 días = 20.871 semanas justas). Por eso las anclas de siglo siguen el patrón <em class=\"hl\">5·3·2·0<\u002Fem> — y el siglo XXIII vuelve a tener las mismas filas que el XIX.<\u002Fdiv>\n      <table class=\"ref-table\">\n        <thead><tr><th>Siglo XIX<\u002Fth><th>Doomsday<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>1800<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>1812<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n          <tr><td>1824<\u002Ftd><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n          <tr><td>1836<\u002Ftd><td>1<\u002Ftd><td>Lunes<\u002Ftd><\u002Ftr>\n          <tr><td>1848<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n          <tr><td>1860<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>1872<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n          <tr><td>1884<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>1896<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <table class=\"ref-table\">\n        <thead><tr><th>Siglo XX<\u002Fth><th>Doomsday<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>1900<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>1912<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n          <tr><td>1924<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>1936<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n          <tr><td>1948<\u002Ftd><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n          <tr><td>1960<\u002Ftd><td>1<\u002Ftd><td>Lunes<\u002Ftd><\u002Ftr>\n          <tr><td>1972<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n          <tr><td>1984<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>1996<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <table class=\"ref-table\">\n        <thead><tr><th>Siglo XXI<\u002Fth><th>Doomsday<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>2000<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n          <tr><td>2012<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>2024<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n          <tr><td>2036<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>2048<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <table class=\"ref-table\">\n        <thead><tr><th>Siglo XXII<\u002Fth><th>Doomsday<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>2100<\u002Ftd><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n          <tr><td>2112<\u002Ftd><td>1<\u002Ftd><td>Lunes<\u002Ftd><\u002Ftr>\n          <tr><td>2124<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n          <tr><td>2136<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n          <tr><td>2148<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n          <tr><td>2160<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n          <tr><td>2172<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n          <tr><td>2184<\u002Ftd><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n          <tr><td>2196<\u002Ftd><td>1<\u002Ftd><td>Lunes<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <div class=\"prose\">Desde un ancla, salta sumando <strong>+1<\u002Fstrong> por año normal y <strong>+2<\u002Fstrong> por bisiesto.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- TOAST -->\n<div class=\"toast\" id=\"toast\">—<\u002Fdiv>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\" style=\"display:none; position:fixed; bottom:24px; right:24px; background:var(--paper); border:1px solid var(--ink); padding:18px 20px 16px; z-index:2000; min-width:200px; box-shadow:0 8px 28px rgba(0,0,0,0.18);\">\n  <div style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.3em; color:var(--ink-3); text-transform:uppercase; margin-bottom:14px;\">Tweaks<\u002Fdiv>\n  <div style=\"font-family:'Fraunces',serif; font-style:italic; font-weight:300; font-size:14px; color:var(--ink-2); margin-bottom:10px;\">Tinta<\u002Fdiv>\n  <div style=\"display:flex; gap:0; border:1px solid var(--ink);\">\n    <button class=\"tw-opt\" data-theme=\"day\" onclick=\"setTweak('theme','day')\" style=\"flex:1; padding:10px 12px; background:none; border:none; border-right:1px solid var(--ink); font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.24em; color:var(--ink-3); text-transform:uppercase; cursor:pointer;\">Día<\u002Fbutton>\n    <button class=\"tw-opt\" data-theme=\"night\" onclick=\"setTweak('theme','night')\" style=\"flex:1; padding:10px 12px; background:none; border:none; font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.24em; color:var(--ink-3); text-transform:uppercase; cursor:pointer;\">Noche<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<style>\n  .tw-opt.active { background: var(--ink) !important; color: var(--paper) !important; font-weight:500 !important; }\n<\u002Fstyle>\n\n<script>\n/* ══════════════════════════════════════════════════════════\n   ESTADO GLOBAL & PERSISTENCIA\n══════════════════════════════════════════════════════════ */\nconst STORE_KEY = 'doomsday_dojo_v2';\nconst initialState = {\n  xp: 0,\n  level: 0,\n  missionsComplete: [],\n  totals: { correct: 0, total: 0, bestStreak: 0, totalTime: 0 },\n  perMonth: {}, // { 1: {c, t}, ... }\n  drillMode: 'zen',\n  currentStreak: 0\n};\nlet state = loadState();\n\nfunction loadState() {\n  try {\n    const raw = localStorage.getItem(STORE_KEY);\n    if (!raw) return JSON.parse(JSON.stringify(initialState));\n    return { ...JSON.parse(JSON.stringify(initialState)), ...JSON.parse(raw) };\n  } catch (e) {\n    return JSON.parse(JSON.stringify(initialState));\n  }\n}\n\nfunction saveState() {\n  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }\n  catch (e) {}\n}\n\n/* ══════════════════════════════════════════════════════════\n   MOTOR DE CÁLCULO DOOMSDAY\n══════════════════════════════════════════════════════════ */\nconst DAYS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];\nconst DAYS_SHORT = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];\nconst MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];\nconst MONTH_ANCHORS = [3,28,7,4,9,6,11,8,5,10,7,12]; // ene...dic en año normal\n\nfunction isLeap(y) {\n  return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;\n}\nfunction centuryAnchor(year) {\n  const c = Math.floor(year / 100);\n  return [2, 0, 5, 3][((c % 4) + 4) % 4];\n}\nfunction doomsdayOfYear(year) {\n  const yy = year % 100;\n  const a = centuryAnchor(year);\n  const q = Math.floor(yy / 12);\n  const r = yy % 12;\n  const s = Math.floor(r / 4);\n  return ((a + q + r + s) % 7 + 7) % 7;\n}\nfunction monthAnchor(m, y) {\n  let v = MONTH_ANCHORS[m - 1];\n  if (m === 1) v = isLeap(y) ? 4 : 3;\n  if (m === 2) v = isLeap(y) ? 29 : 28;\n  return v;\n}\nfunction dayOfWeek(d, m, y) {\n  const dd = doomsdayOfYear(y);\n  const a = monthAnchor(m, y);\n  return ((dd + (d - a)) % 7 + 7) % 7;\n}\n\n/* ══════════════════════════════════════════════════════════\n   TABS\n══════════════════════════════════════════════════════════ */\ndocument.querySelectorAll('.tab').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const id = btn.dataset.tab;\n    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));\n    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));\n    btn.classList.add('active');\n    document.getElementById('panel-' + id).classList.add('active');\n    if (id === 'drill') startDrill();\n    if (id === 'stats') refreshStats();\n  });\n});\n\n/* ══════════════════════════════════════════════════════════\n   XP / LEVELING\n══════════════════════════════════════════════════════════ */\nfunction awardXP(n, reason) {\n  state.xp += n;\n  state.level = Math.floor(state.xp / 100);\n  saveState();\n  refreshXP();\n  if (reason) toast(`+${n} XP · ${reason}`, 'success');\n}\nfunction refreshXP() {\n  document.getElementById('xp-text').textContent = state.xp + ' xp';\n  document.getElementById('lv-badge').textContent = 'N' + state.level;\n}\nrefreshXP();\n\nfunction toast(msg, kind) {\n  const el = document.getElementById('toast');\n  el.textContent = msg;\n  el.className = 'toast show ' + (kind || '');\n  clearTimeout(el._t);\n  el._t = setTimeout(() => el.classList.remove('show'), 2400);\n}\n\n/* ══════════════════════════════════════════════════════════\n   MISIONES (LECCIONES)\n══════════════════════════════════════════════════════════ */\nfunction refreshMissions() {\n  document.querySelectorAll('.mission').forEach(el => {\n    const n = +el.dataset.mission;\n    el.classList.remove('locked', 'complete');\n    const status = el.querySelector('.mission-status');\n    if (status) status.remove();\n    if (state.missionsComplete.includes(n)) {\n      el.classList.add('complete');\n      const s = document.createElement('div');\n      s.className = 'mission-status';\n      s.textContent = '✓ COMPLETADA';\n      el.querySelector('.mission-meta').appendChild(s);\n    } else if (n > 1 && !state.missionsComplete.includes(n - 1)) {\n      el.classList.add('locked');\n    }\n  });\n}\nrefreshMissions();\n\nfunction openLesson(n) {\n  const el = document.querySelector(`.mission[data-mission=\"${n}\"]`);\n  if (el.classList.contains('locked')) {\n    toast('Completa la misión anterior primero', 'warn');\n    return;\n  }\n  document.getElementById('mission-list').classList.add('hidden');\n  document.getElementById('lesson-view').classList.remove('hidden');\n  document.getElementById('lesson-content').innerHTML = LESSONS[n]();\n  // Activar handlers internos si la lección los tiene\n  if (typeof window['initLesson' + n] === 'function') {\n    window['initLesson' + n]();\n  }\n  window.scrollTo({ top: 0, behavior: 'smooth' });\n}\nfunction closeLesson() {\n  document.getElementById('mission-list').classList.remove('hidden');\n  document.getElementById('lesson-view').classList.add('hidden');\n}\nfunction completeMission(n) {\n  if (!state.missionsComplete.includes(n)) {\n    state.missionsComplete.push(n);\n    awardXP(50, `Misión ${n} completada`);\n    saveState();\n    refreshMissions();\n  }\n  closeLesson();\n}\n\n/* ══════════════════════════════════════════════════════════\n   CONTENIDO DE CADA LECCIÓN (HTML)\n══════════════════════════════════════════════════════════ */\nconst LESSONS = {\n  // ─────── MISIÓN 1 ───────\n  1: () => `\n    <div class=\"lesson-title\">El día <em>ancla<\u002Fem><\u002Fdiv>\n    <div class=\"lesson-sub\">Misión I · La idea que lo cambia todo<\u002Fdiv>\n\n    <div class=\"prose\">\n      Imagina un calendario cualquiera. <strong>4 de abril, 6 de junio, 8 de agosto, 10 de octubre, 12 de diciembre<\u002Fstrong>. Cinco fechas. <em class=\"hl\">Todas caen el mismo día de la semana en cualquier año dado.<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"prose\">\n      Si en 2024 el 4 de abril fue jueves, el 6 de junio también, y el 8 de agosto también. Conway llamó a este día compartido el <em class=\"hl\">Doomsday<\u002Fem> del año.\n    <\u002Fdiv>\n\n    <div class=\"doomsday-wheel-wrap\">\n      <div class=\"doomsday-wheel\">\n        <svg viewBox=\"-150 -150 300 300\" id=\"wheel-svg\"><\u002Fsvg>\n        <div class=\"wheel-center\">\n          <div class=\"label\">Doomsday<\u002Fdiv>\n          <div class=\"day\" id=\"wheel-day\">Jueves<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"wheel-controls\">\n        <button class=\"stepper\" onclick=\"changeWheelYear(-1)\">−<\u002Fbutton>\n        <input type=\"number\" id=\"wheel-year\" value=\"2024\" min=\"1900\" max=\"2099\" onchange=\"renderWheel()\">\n        <button class=\"stepper\" onclick=\"changeWheelYear(1)\">+<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prose\">\n      ↑ Toca el ${'≪'} − ${'≫'} para cambiar el año. <strong>Observa cómo todas las anclas giran a la vez al mismo día<\u002Fstrong>. Eso es el patrón Doomsday: 12 fechas amarradas con el mismo hilo.\n    <\u002Fdiv>\n\n    <div class=\"prose\">\n      Esto reduce el problema. En vez de calcular el día de una fecha cualquiera, calculamos el día de una <em>fecha ancla<\u002Fem> cercana, y luego saltamos al objetivo con una resta. Mucho más fácil.\n    <\u002Fdiv>\n\n    <div class=\"example\">\n      <div class=\"example-label\">El plan, en dos fases<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Fase A<\u002Fspan><span class=\"rhs\">Calcular el Doomsday del año<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Fase B<\u002Fspan><span class=\"rhs\">Saltar de un ancla del mes al día buscado<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"center\" style=\"margin-top:32px\">\n      <button class=\"btn-action\" onclick=\"completeMission(1)\">Entendido — siguiente misión<\u002Fbutton>\n    <\u002Fdiv>\n  `,\n\n  // ─────── MISIÓN 2 ───────\n  2: () => `\n    <div class=\"lesson-title\">Las <em>doce<\u002Fem> anclas<\u002Fdiv>\n    <div class=\"lesson-sub\">Misión II · Una fecha por mes, doce historias<\u002Fdiv>\n\n    <div class=\"prose\">\n      Cada mes tiene una <strong>fecha ancla<\u002Fstrong> — un día Doomsday seguro. Una vez los memorices, nunca tendrás que pensar más allá del mes.\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:24px 0 8px;color:var(--accent-3)\">Familia 1 · Los días cuadrados<\u002Fh3>\n    <div class=\"prose\" style=\"font-size:16px\">El día y el mes coinciden. <em class=\"hl\">4/4 · 6/6 · 8/8 · 10/10 · 12/12<\u002Fem>. Solo en meses pares mayores.<\u002Fdiv>\n    <div class=\"anchor-grid\">\n      <div class=\"anchor-card square\"><div class=\"month\">Abril<\u002Fdiv><div class=\"date\">4<\u002Fdiv><div class=\"mnemo\">4/4 abril<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card square\"><div class=\"month\">Junio<\u002Fdiv><div class=\"date\">6<\u002Fdiv><div class=\"mnemo\">6/6 junio<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card square\"><div class=\"month\">Agosto<\u002Fdiv><div class=\"date\">8<\u002Fdiv><div class=\"mnemo\">8/8 agosto<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card square\"><div class=\"month\">Octubre<\u002Fdiv><div class=\"date\">10<\u002Fdiv><div class=\"mnemo\">10/10 oct<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card square\"><div class=\"month\">Diciembre<\u002Fdiv><div class=\"date\">12<\u002Fdiv><div class=\"mnemo\">12/12 dic<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:24px 0 8px;color:var(--accent-2)\">Familia 2 · \"9 a 5\" (oficina)<\u002Fh3>\n    <div class=\"prose\" style=\"font-size:16px\">El horario laboral te lo recuerda. <em class=\"hl\">9/5 y 5/9<\u002Fem>: 9 de mayo, 5 de septiembre.<\u002Fdiv>\n    <div class=\"anchor-grid\">\n      <div class=\"anchor-card nineToFive\"><div class=\"month\">Mayo<\u002Fdiv><div class=\"date\">9<\u002Fdiv><div class=\"mnemo\">\"9 a 5\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card nineToFive\"><div class=\"month\">Septiembre<\u002Fdiv><div class=\"date\">5<\u002Fdiv><div class=\"mnemo\">\"9 a 5\"<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:24px 0 8px;color:var(--accent-4)\">Familia 3 · \"7-Eleven\" (tienda)<\u002Fh3>\n    <div class=\"prose\" style=\"font-size:16px\">La cadena 24h. <em class=\"hl\">11/7 y 7/11<\u002Fem>: 11 de julio, 7 de noviembre.<\u002Fdiv>\n    <div class=\"anchor-grid\">\n      <div class=\"anchor-card sevenEleven\"><div class=\"month\">Julio<\u002Fdiv><div class=\"date\">11<\u002Fdiv><div class=\"mnemo\">\"7-Eleven\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card sevenEleven\"><div class=\"month\">Noviembre<\u002Fdiv><div class=\"date\">7<\u002Fdiv><div class=\"mnemo\">\"7-Eleven\"<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:24px 0 8px;color:var(--accent)\">Familia 4 · Los raros<\u002Fh3>\n    <div class=\"prose\" style=\"font-size:16px\"><strong>Marzo<\u002Fstrong> es generoso: cualquier múltiplo de 7 (7, 14, 21, 28). <strong>Enero<\u002Fstrong> y <strong>febrero<\u002Fstrong> dependen del año bisiesto — los veremos en la misión 4.<\u002Fdiv>\n    <div class=\"anchor-grid\">\n      <div class=\"anchor-card special\"><div class=\"month\">Marzo<\u002Fdiv><div class=\"date\">7·14<br>21·28<\u002Fdiv><div class=\"mnemo\">\"todos múltiplos de 7\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card special\"><div class=\"month\">Enero<\u002Fdiv><div class=\"date\">3 · 4<\u002Fdiv><div class=\"mnemo\">3 normal, 4 bisiesto<\u002Fdiv><\u002Fdiv>\n      <div class=\"anchor-card special\"><div class=\"month\">Febrero<\u002Fdiv><div class=\"date\">28·29<\u002Fdiv><div class=\"mnemo\">último día siempre<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"example\" style=\"border-left-color:var(--accent-2)\">\n      <div class=\"example-label\">Ejemplo de salto<\u002Fdiv>\n      <div class=\"prose\" style=\"font-size:15px;margin:0\">\n        ¿15 de julio de 2024? Doomsday 2024 = jueves. Ancla julio = 11. Diferencia: 15 − 11 = +4 días. Jueves + 4 = <strong>lunes<\u002Fstrong>. ✓\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"center\" style=\"margin-top:32px\">\n      <button class=\"btn-action\" onclick=\"completeMission(2)\">Memorizadas — siguiente misión<\u002Fbutton>\n    <\u002Fdiv>\n  `,\n\n  // ─────── MISIÓN 3 ───────\n  3: () => `\n    <div class=\"lesson-title\">El año en <em>4 pasos<\u002Fem><\u002Fdiv>\n    <div class=\"lesson-sub\">Misión III · Cálculo del Doomsday del año<\u002Fdiv>\n\n    <div class=\"prose\">\n      Toma <strong>YY<\u002Fstrong> = las dos últimas cifras del año. Vamos a destilarlo en una sola cifra entre 0 y 6.\n    <\u002Fdiv>\n\n    <div class=\"example\">\n      <div class=\"example-label\">La receta de Conway<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">① Q<\u002Fspan><span class=\"rhs\">= YY ÷ 12 (parte entera)<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">② R<\u002Fspan><span class=\"rhs\">= YY mod 12 (resto)<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">③ S<\u002Fspan><span class=\"rhs\">= R ÷ 4 (parte entera)<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step final\"><span class=\"lhs\">Resultado<\u002Fspan><span class=\"rhs\">(<b>siglo + Q + R + S<\u002Fb>) mod 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prose\">¿Por qué funciona? Cada año normal corre el calendario un día. Cada bisiesto, dos. Q cuenta los ciclos de 12 (cada uno avanza exactamente 7 días, así que es 0 mod 7), R cuenta los años sueltos, y S los bisiestos extra dentro de R.<\u002Fdiv>\n\n    <div class=\"example\" style=\"border-left-color:var(--accent-2)\">\n      <div class=\"example-label\">Práctica · año 1969<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">YY = 69<\u002Fspan><span class=\"rhs\">siglo XX → ancla 3<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Q = 69÷12<\u002Fspan><span class=\"rhs\">= <b>5<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">R = 69 mod 12<\u002Fspan><span class=\"rhs\">= 69 − 60 = <b>9<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">S = 9÷4<\u002Fspan><span class=\"rhs\">= <b>2<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step final\"><span class=\"lhs\">Doomsday<\u002Fspan><span class=\"rhs\">(3+5+9+2) mod 7 = 19 mod 7 = <b>5<\u002Fb> (Viernes)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prose\">Significa que el 4/4/1969, 6/6/1969, 9/5/1969, 11/7/1969... todos fueron viernes. El 15 de julio de 1969 fue 4 días después del 11 → 5+4=9 mod 7 = 2 → <strong>Martes<\u002Fstrong>. (El día en que el Apollo 11 alunizó.)<\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:24px 0 8px\">Comprueba tú mismo<\u002Fh3>\n    <div class=\"prose\">Calcula el Doomsday de 1985 mentalmente, y compáralo con la respuesta:<\u002Fdiv>\n    <details style=\"margin-top:10px\">\n      <summary>Solución<\u002Fsummary>\n      <div class=\"example\">\n        <div class=\"example-step\"><span class=\"lhs\">YY = 85<\u002Fspan><span class=\"rhs\">siglo XX → ancla 3<\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">Q<\u002Fspan><span class=\"rhs\">= 85÷12 = <b>7<\u002Fb><\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">R<\u002Fspan><span class=\"rhs\">= 85 − 84 = <b>1<\u002Fb><\u002Fspan><\u002Fdiv>\n        <div class=\"example-step\"><span class=\"lhs\">S<\u002Fspan><span class=\"rhs\">= 1÷4 = <b>0<\u002Fb><\u002Fspan><\u002Fdiv>\n        <div class=\"example-step final\"><span class=\"lhs\">Doomsday<\u002Fspan><span class=\"rhs\">(3+7+1+0) mod 7 = 11 mod 7 = <b>4<\u002Fb> (Jueves)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <div class=\"center\" style=\"margin-top:32px\">\n      <button class=\"btn-action\" onclick=\"completeMission(3)\">Lo tengo — siguiente misión<\u002Fbutton>\n    <\u002Fdiv>\n  `,\n\n  // ─────── MISIÓN 4 ───────\n  4: () => `\n    <div class=\"lesson-title\">Bisiestos y el <em>tropiezo<\u002Fem><\u002Fdiv>\n    <div class=\"lesson-sub\">Misión IV · Detección rápida + ajuste de enero/febrero<\u002Fdiv>\n\n    <div class=\"prose\">\n      Antes de nada: <strong>el bisiesto solo importa para fechas de enero y febrero<\u002Fstrong>. En los otros 10 meses, ignóralo. El día extra (29 de febrero) ya pasó cuando llega marzo, así que las anclas posteriores no se mueven.\n    <\u002Fdiv>\n\n    <div class=\"example\" style=\"border-left-color:var(--accent)\">\n      <div class=\"example-label\">Solo cambia para enero y febrero<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Enero (normal)<\u002Fspan><span class=\"rhs\">ancla = <b>3<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Enero (bisiesto)<\u002Fspan><span class=\"rhs\">ancla = <b>4<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Febrero (normal)<\u002Fspan><span class=\"rhs\">ancla = <b>28<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Febrero (bisiesto)<\u002Fspan><span class=\"rhs\">ancla = <b>29<\u002Fb><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:24px 0 8px\">¿Cómo detectar un bisiesto en un parpadeo?<\u002Fh3>\n\n    <div class=\"prose\"><strong>Atajo 1 (1901–2099):<\u002Fstrong> ignora la regla del 100/400. Solo importa \"÷ 4\". El único año redondo de la ventana es 2000, y es bisiesto.<\u002Fdiv>\n\n    <div class=\"prose\"><strong>Atajo 2:<\u002Fstrong> mira la última cifra de YY:<\u002Fdiv>\n\n    <table class=\"ref-table\">\n      <thead><tr><th>Última cifra<\u002Fth><th>Penúltima par<\u002Fth><th>Penúltima impar<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>0, 4, 8<\u002Ftd><td>Bisiesto ✓<\u002Ftd><td>No<\u002Ftd><\u002Ftr>\n        <tr><td>2, 6<\u002Ftd><td>No<\u002Ftd><td>Bisiesto ✓<\u002Ftd><\u002Ftr>\n        <tr><td>1, 3, 5, 7, 9<\u002Ftd><td colspan=\"2\" style=\"text-align:center\">Nunca<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"example\" style=\"border-left-color:var(--accent-2)\">\n      <div class=\"example-label\">Ejemplos en menos de un segundo<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">1996<\u002Fspan><span class=\"rhs\">termina en 6, penúltima 9 (impar) → <b>bisiesto ✓<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">1998<\u002Fspan><span class=\"rhs\">termina en 8, penúltima 9 (impar) → <b>NO<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">2024<\u002Fspan><span class=\"rhs\">termina en 4, penúltima 2 (par) → <b>bisiesto ✓<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">2031<\u002Fspan><span class=\"rhs\">termina en 1 (impar) → <b>NO<\u002Fb> (sin pensar más)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prose\"><strong>Excepción<\u002Fstrong>: en años redondos (terminan en 00) sí necesitas la regla completa: bisiesto si ÷ 400. Pero esto solo afecta a 1900 (no), 2000 (sí), 2100 (no)...<\u002Fdiv>\n\n    <div class=\"center\" style=\"margin-top:32px\">\n      <button class=\"btn-action\" onclick=\"completeMission(4)\">Lo entiendo — siguiente misión<\u002Fbutton>\n    <\u002Fdiv>\n  `,\n\n  // ─────── MISIÓN 5 ───────\n  5: () => `\n    <div class=\"lesson-title\">Atajos de <em>maestro<\u002Fem><\u002Fdiv>\n    <div class=\"lesson-sub\">Misión V · Velocidad pura<\u002Fdiv>\n\n    <div class=\"prose\">\n      Llegaste hasta aquí. Bien. Ahora dos atajos para llevar el cálculo de \"10 segundos\" a \"2 segundos\".\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:28px 0 8px;color:var(--accent-2)\">Atajo I · <em style=\"font-style:italic\">Odd+11<\u002Fem><\u002Fh3>\n    <div class=\"prose\">Una variante del cálculo del año más lineal de aplicar: todo se reduce a \"si es impar, súmale 11\".<\u002Fdiv>\n\n    <div class=\"example\">\n      <div class=\"example-label\">3 pasos<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">① YY<\u002Fspan><span class=\"rhs\">si impar, +11. Llamamos A.<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">② A÷2<\u002Fspan><span class=\"rhs\">si impar, +11. Llamamos B.<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step final\"><span class=\"lhs\">Doomsday<\u002Fspan><span class=\"rhs\">((7 − B mod 7) + <b>siglo<\u002Fb>) mod 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"example\" style=\"border-left-color:var(--accent-2)\">\n      <div class=\"example-label\">Ejemplo · 2024<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">YY = 24<\u002Fspan><span class=\"rhs\">par → A = 24<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">24÷2 = 12<\u002Fspan><span class=\"rhs\">par → B = 12<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">12 mod 7 = 5<\u002Fspan><span class=\"rhs\">7 − 5 = 2<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step final\"><span class=\"lhs\">Doomsday<\u002Fspan><span class=\"rhs\">(2 + 2) mod 7 = <b>4<\u002Fb> (Jueves) ✓<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:32px 0 8px;color:var(--accent-4)\">Atajo II · <em style=\"font-style:italic\">Décadas memorizadas<\u002Fem><\u002Fh3>\n    <div class=\"prose\">El Doomsday avanza <strong>+1 año normal, +2 bisiesto<\u002Fstrong>. Memoriza pocos años ancla y avanza con sumas pequeñas.<\u002Fdiv>\n\n    <div class=\"prose\"><strong>La cadencia mágica · cada 12 años, +1 día.<\u002Fstrong> 12 años normales (+12 días) más los 3 bisiestos del intervalo (+3 días) = 15 días = <strong>+1 mod 7<\u002Fstrong>. Por eso anclas separadas por 12 años bajan UN día por fila — la tabla se deriva sola.<\u002Fdiv>\n    <div class=\"prose\">Memoriza UNA ancla por siglo (<strong>1900 = miércoles<\u002Fstrong>, <strong>2000 = martes<\u002Fstrong>) y cuenta hacia abajo.<\u002Fdiv>\n\n    <table class=\"ref-table\">\n      <thead><tr><th>Siglo XX<\u002Fth><th>Doomsday<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>1900<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n        <tr><td>1912<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n        <tr><td>1924<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n        <tr><td>1936<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n        <tr><td>1948<\u002Ftd><td>0<\u002Ftd><td>Domingo<\u002Ftd><\u002Ftr>\n        <tr><td>1960<\u002Ftd><td>1<\u002Ftd><td>Lunes<\u002Ftd><\u002Ftr>\n        <tr><td>1972<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n        <tr><td>1984<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n        <tr><td>1996<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <table class=\"ref-table\">\n      <thead><tr><th>Siglo XXI<\u002Fth><th>Doomsday<\u002Fth><th>Día<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>2000<\u002Ftd><td>2<\u002Ftd><td>Martes<\u002Ftd><\u002Ftr>\n        <tr><td>2012<\u002Ftd><td>3<\u002Ftd><td>Miércoles<\u002Ftd><\u002Ftr>\n        <tr><td>2024<\u002Ftd><td>4<\u002Ftd><td>Jueves<\u002Ftd><\u002Ftr>\n        <tr><td>2036<\u002Ftd><td>5<\u002Ftd><td>Viernes<\u002Ftd><\u002Ftr>\n        <tr><td>2048<\u002Ftd><td>6<\u002Ftd><td>Sábado<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"example\" style=\"border-left-color:var(--accent-2)\">\n      <div class=\"example-label\">Saltando · ¿Doomsday de 2027?<\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">Ancla 2024<\u002Fspan><span class=\"rhs\">Jueves (4)<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">2024→25<\u002Fspan><span class=\"rhs\">+1 normal = 5<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">2025→26<\u002Fspan><span class=\"rhs\">+1 normal = 6<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step final\"><span class=\"lhs\">2026→27<\u002Fspan><span class=\"rhs\">+1 normal = <b>0<\u002Fb> (Domingo)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prose\">⚠ <strong>Cuidado<\u002Fstrong>: si cruzas un bisiesto, suma +2 ese año (no +1).<\u002Fdiv>\n\n    <h3 style=\"font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:32px 0 8px\">El flujo del experto<\u002Fh3>\n    <div class=\"prose\">Cuando ves una fecha, en menos de 5 segundos pasa esto en tu cabeza:<\u002Fdiv>\n\n    <div class=\"example\">\n      <div class=\"example-step\"><span class=\"lhs\">1.<\u002Fspan><span class=\"rhs\">Año cerca de un ancla → salto rápido al Doomsday del año<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">2.<\u002Fspan><span class=\"rhs\">Mes → ancla del mes (memorizada)<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step\"><span class=\"lhs\">3.<\u002Fspan><span class=\"rhs\">Diferencia día − ancla, mod 7<\u002Fspan><\u002Fdiv>\n      <div class=\"example-step final\"><span class=\"lhs\">→<\u002Fspan><span class=\"rhs\">Día de la semana<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"center\" style=\"margin-top:32px\">\n      <button class=\"btn-action\" onclick=\"completeMission(5); toast('🎓 Camino completo. Eres un calendario humano.', 'success')\">Listo — soy un calendario humano<\u002Fbutton>\n    <\u002Fdiv>\n  `\n};\n\n/* ══════════════════════════════════════════════════════════\n   RUEDA DOOMSDAY (interactiva en lección 1)\n══════════════════════════════════════════════════════════ */\nfunction changeWheelYear(d) {\n  const inp = document.getElementById('wheel-year');\n  if (!inp) return;\n  inp.value = Math.max(1900, Math.min(2099, +inp.value + d));\n  renderWheel();\n}\nfunction renderWheel() {\n  const yearEl = document.getElementById('wheel-year');\n  const svg = document.getElementById('wheel-svg');\n  const dayEl = document.getElementById('wheel-day');\n  if (!yearEl || !svg) return;\n  const year = +yearEl.value;\n  const dd = doomsdayOfYear(year);\n  dayEl.textContent = DAYS[dd];\n\n  const ANCHORS = [\n    { d: isLeap(year) ? 4 : 3,  label: 'enero' },\n    { d: isLeap(year) ? 29 : 28, label: 'febrero' },\n    { d: 14, label: 'marzo' },\n    { d: 4,  label: 'abril' },\n    { d: 9,  label: 'mayo' },\n    { d: 6,  label: 'junio' },\n    { d: 11, label: 'julio' },\n    { d: 8,  label: 'agosto' },\n    { d: 5,  label: 'septiembre' },\n    { d: 10, label: 'octubre' },\n    { d: 7,  label: 'noviembre' },\n    { d: 12, label: 'diciembre' }\n  ];\n\n  // SVG: viewBox -150 -150 300 300 (centro 0,0)\n  let html = '';\n\n  // —— Anillo cerrado, trazo fino ——\n  html += `<circle cx=\"0\" cy=\"0\" r=\"138\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" opacity=\"0.85\"/>`;\n\n  // —— Definir un path circular para que las etiquetas fluyan a lo largo ——\n  // Path: arco completo, partiendo desde la parte superior, sentido horario.\n  // Usamos r=128 para que el texto quede ligeramente fuera del anillo de números.\n  // Truco: para que cada etiqueta empiece en la posición correcta del mes (cada 30°),\n  // creamos 12 paths, cada uno empezando en su ángulo de inicio de mes.\n  html += '<defs>';\n  for (let i = 0; i < 12; i++) {\n    // Cada mes ocupa 30°. La etiqueta se centra en el ángulo del mes.\n    // El path empieza un poco antes (para el text-anchor middle con startOffset 50%).\n    const angCenter = (i / 12) * Math.PI * 2 - Math.PI / 2;\n    const r = 128;\n    // Un arco que cubre ~25° centrado en el mes\n    const arcSpan = 25 * Math.PI / 180;\n    const a1 = angCenter - arcSpan / 2;\n    const a2 = angCenter + arcSpan / 2;\n    const x1 = (Math.cos(a1) * r).toFixed(2);\n    const y1 = (Math.sin(a1) * r).toFixed(2);\n    const x2 = (Math.cos(a2) * r).toFixed(2);\n    const y2 = (Math.sin(a2) * r).toFixed(2);\n    // Para meses en la mitad inferior del círculo, dibujamos el arco al revés\n    // (de derecha a izquierda en sentido geométrico, pero leyéndose siempre boca arriba)\n    // Eso significa: si el centro angular está entre 0° y 180° (parte inferior en SVG, donde y > 0),\n    // invertimos los puntos del arco y usamos sweep-flag 0.\n    const isLower = Math.sin(angCenter) > 0;\n    if (isLower) {\n      // path al revés, con r negativo en sweep-flag\n      html += `<path id=\"lp${i}\" d=\"M ${x2} ${y2} A ${r} ${r} 0 0 0 ${x1} ${y1}\" fill=\"none\"/>`;\n    } else {\n      html += `<path id=\"lp${i}\" d=\"M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}\" fill=\"none\"/>`;\n    }\n  }\n  html += '<\u002Fdefs>';\n\n  // —— Las 12 anclas: número grande en serif italic, en lavanda, posición sin contenedor ——\n  ANCHORS.forEach((a, i) => {\n    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;\n    const x = (Math.cos(angle) * 96).toFixed(2);\n    const y = (Math.sin(angle) * 96).toFixed(2);\n\n    // Número del día ancla, grande, en cursiva\n    html += `<text x=\"${x}\" y=\"${y}\" text-anchor=\"middle\" dominant-baseline=\"central\" class=\"wheel-num\" font-family=\"Fraunces, serif\" font-size=\"22\" font-weight=\"300\" font-style=\"italic\">${a.d}<\u002Ftext>`;\n  });\n\n  // —— Etiquetas de mes fluyendo siguiendo el círculo ——\n  ANCHORS.forEach((a, i) => {\n    html += `<text font-family=\"JetBrains Mono, monospace\" font-size=\"7.5\" letter-spacing=\"2.2\" font-weight=\"400\" class=\"wheel-lbl\">`;\n    html += `<textPath href=\"#lp${i}\" startOffset=\"50%\" text-anchor=\"middle\">${a.label.toUpperCase()}<\u002FtextPath>`;\n    html += `<\u002Ftext>`;\n  });\n\n  svg.innerHTML = html;\n}\nwindow.initLesson1 = renderWheel;\n\n/* ══════════════════════════════════════════════════════════\n   DOJO (DRILL)\n══════════════════════════════════════════════════════════ */\nlet drill = {\n  d: 0, m: 0, y: 0, answer: 0, answered: false,\n  startTime: 0, lives: 3, mode: 'zen'\n};\n\nconst MODE_DESCS = {\n  zen:   '<em>Sin reloj, sin penalización.<\u002Fem> Practica a tu ritmo — la mano aprende sola.',\n  speed: '<em>Reloj corriendo.<\u002Fem> Cada fecha cronometrada; rápido bajo 3s gana XP extra.',\n  lives: '<em>Tres errores y se acaba la partida.<\u002Fem> Mide tu racha bajo presión.'\n};\nfunction refreshModeDesc() {\n  const el = document.getElementById('mode-desc');\n  if (el) el.innerHTML = MODE_DESCS[state.drillMode] || MODE_DESCS.zen;\n}\ndocument.querySelectorAll('.mode-btn').forEach(b => {\n  b.addEventListener('click', () => {\n    document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));\n    b.classList.add('active');\n    drill.mode = b.dataset.mode;\n    state.drillMode = b.dataset.mode;\n    drill.lives = 3;\n    saveState();\n    refreshModeDesc();\n    nextDrill();\n  });\n});\n\nfunction buildDayGrid() {\n  const grid = document.getElementById('day-grid');\n  if (grid.children.length === 7) return;\n  grid.innerHTML = DAYS_SHORT.map((d, i) =>\n    `<button class=\"day-btn\" data-day=\"${i}\">${d}<\u002Fbutton>`\n  ).join('');\n  Array.from(grid.children).forEach((btn, i) => {\n    btn.addEventListener('click', () => answer(i));\n  });\n}\n\nfunction startDrill() {\n  buildDayGrid();\n  // Restablecer modo seleccionado\n  document.querySelectorAll('.mode-btn').forEach(b => {\n    b.classList.toggle('active', b.dataset.mode === state.drillMode);\n  });\n  drill.mode = state.drillMode;\n  refreshModeDesc();\n  nextDrill();\n}\n\nfunction nextDrill() {\n  const grid = document.getElementById('day-grid');\n  if (!grid) return;\n  drill.answered = false;\n  document.getElementById('drill-feedback').textContent = '';\n  document.getElementById('drill-feedback').className = 'drill-feedback';\n  document.getElementById('hint-box').style.display = 'none';\n  Array.from(grid.children).forEach(b => {\n    b.classList.remove('correct', 'wrong', 'reveal');\n    b.disabled = false;\n  });\n\n  // Generar fecha. Si hay datos de fallos, sesgar hacia meses con más fallos.\n  let m;\n  if (state.totals.total > 20) {\n    const monthScores = MONTHS.map((_, idx) => {\n      const k = idx + 1;\n      const s = state.perMonth[k] || { c: 0, t: 0 };\n      const errRate = s.t === 0 ? 0.5 : (s.t - s.c) / s.t;\n      return { m: k, w: 0.2 + errRate * 1.5 };\n    });\n    const sum = monthScores.reduce((s, x) => s + x.w, 0);\n    let r = Math.random() * sum;\n    for (const ms of monthScores) {\n      r -= ms.w;\n      if (r <= 0) { m = ms.m; break; }\n    }\n    if (!m) m = 1 + Math.floor(Math.random() * 12);\n  } else {\n    m = 1 + Math.floor(Math.random() * 12);\n  }\n  const y = 1900 + Math.floor(Math.random() * 200);\n  const maxD = [31, isLeap(y) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][m - 1];\n  const d = 1 + Math.floor(Math.random() * maxD);\n\n  drill.d = d; drill.m = m; drill.y = y;\n  drill.answer = dayOfWeek(d, m, y);\n  drill.startTime = performance.now();\n\n  document.getElementById('drill-date').innerHTML =\n    `${d} <em>de<\u002Fem> ${MONTHS[m - 1].toLowerCase()} <em>de<\u002Fem> ${y}`;\n\n  if (drill.mode === 'speed') {\n    runSpeedTimer();\n  } else {\n    document.getElementById('drill-timer').textContent = '';\n  }\n  refreshStreakDisplay();\n}\n\nlet speedInterval;\nfunction runSpeedTimer() {\n  clearInterval(speedInterval);\n  const t = document.getElementById('drill-timer');\n  speedInterval = setInterval(() => {\n    if (drill.answered) { clearInterval(speedInterval); return; }\n    const ms = performance.now() - drill.startTime;\n    t.textContent = (ms / 1000).toFixed(1) + ' s';\n  }, 50);\n}\n\nfunction answer(idx) {\n  if (drill.answered) return;\n  drill.answered = true;\n  clearInterval(speedInterval);\n  const elapsed = (performance.now() - drill.startTime) / 1000;\n  const grid = document.getElementById('day-grid');\n  const btns = Array.from(grid.children);\n  btns.forEach(b => b.disabled = true);\n\n  const fb = document.getElementById('drill-feedback');\n  state.totals.total++;\n  state.totals.totalTime += elapsed;\n  if (!state.perMonth[drill.m]) state.perMonth[drill.m] = { c: 0, t: 0 };\n  state.perMonth[drill.m].t++;\n\n  if (idx === drill.answer) {\n    btns[idx].classList.add('correct');\n    state.totals.correct++;\n    state.perMonth[drill.m].c++;\n    state.currentStreak++;\n    if (state.currentStreak > state.totals.bestStreak) {\n      state.totals.bestStreak = state.currentStreak;\n    }\n    fb.className = 'drill-feedback ok';\n    fb.textContent = drill.mode === 'speed'\n      ? `¡Bien! ${elapsed.toFixed(1)}s`\n      : '¡Bien hecho!';\n    awardXP(drill.mode === 'speed' && elapsed < 3 ? 15 : 10);\n    setTimeout(() => nextDrill(), 1200);\n  } else {\n    btns[idx].classList.add('wrong');\n    btns[drill.answer].classList.add('reveal');\n    state.currentStreak = 0;\n    fb.className = 'drill-feedback err';\n    fb.textContent = `Era ${DAYS[drill.answer]}`;\n    if (drill.mode === 'lives') {\n      drill.lives--;\n      if (drill.lives <= 0) {\n        toast('¡Game Over! 3 vidas perdidas', 'warn');\n        drill.lives = 3;\n      }\n    }\n    setTimeout(() => nextDrill(), 1800);\n  }\n  saveState();\n  refreshXP();\n  refreshStreakDisplay();\n}\n\nfunction refreshStreakDisplay() {\n  const el = document.getElementById('streak-display');\n  if (!el) return;\n  const n = Math.min(state.currentStreak, 10);\n  el.innerHTML = '';\n  for (let i = 0; i < n; i++) {\n    const s = document.createElement('span');\n    s.className = 'streak-flame';\n    el.appendChild(s);\n  }\n  if (state.currentStreak > 0) {\n    const txt = document.createElement('span');\n    txt.style.cssText = 'font-family:JetBrains Mono;font-size:11px;color:var(--muted);letter-spacing:1.5px;margin-left:6px;align-self:center';\n    txt.textContent = state.currentStreak + ' RACHA';\n    el.appendChild(txt);\n  }\n}\n\nfunction toggleHint() {\n  const h = document.getElementById('hint-box');\n  if (h.style.display === 'block') {\n    h.style.display = 'none';\n    return;\n  }\n  const { d, m, y } = drill;\n  const yy = y % 100;\n  const a = centuryAnchor(y);\n  const q = Math.floor(yy / 12);\n  const r = yy % 12;\n  const s = Math.floor(r / 4);\n  const dd = ((a + q + r + s) % 7 + 7) % 7;\n  const ma = monthAnchor(m, y);\n  const diff = d - ma;\n  h.innerHTML = `\n    <strong>Paso a paso<\u002Fstrong><br>\n    Ancla siglo: <span class=\"hl\">${a}<\u002Fspan> · YY = ${yy}<br>\n    ${yy}÷12 = <span class=\"hl\">${q}<\u002Fspan> · ${yy} mod 12 = <span class=\"hl\">${r}<\u002Fspan> · ${r}÷4 = <span class=\"hl\">${s}<\u002Fspan><br>\n    Doomsday año = (${a}+${q}+${r}+${s}) mod 7 = <span class=\"hl\">${dd}<\u002Fspan> (${DAYS[dd]})<br>\n    Ancla ${MONTHS[m-1]}: <span class=\"hl\">${ma}<\u002Fspan> · diff = ${d}−${ma} = ${diff > 0 ? '+' : ''}${diff}<br>\n    Resultado: (${dd}+${diff}) mod 7 = <span class=\"hl\">${drill.answer}<\u002Fspan> → ${DAYS[drill.answer]}\n  `;\n  h.style.display = 'block';\n}\n\n/* ══════════════════════════════════════════════════════════\n   STATS\n══════════════════════════════════════════════════════════ */\nfunction refreshStats() {\n  document.getElementById('st-correct').textContent = state.totals.correct;\n  const pct = state.totals.total ? Math.round(state.totals.correct / state.totals.total * 100) + '%' : '—';\n  document.getElementById('st-pct').textContent = pct;\n  document.getElementById('st-streak').textContent = state.totals.bestStreak;\n  const avg = state.totals.total ? (state.totals.totalTime / state.totals.total).toFixed(1) + 's' : '—';\n  document.getElementById('st-time').textContent = avg;\n\n  // Heatmap\n  const map = document.getElementById('heatmap');\n  map.innerHTML = '';\n  for (let i = 1; i <= 12; i++) {\n    const cell = document.createElement('div');\n    cell.className = 'heat-cell';\n    const s = state.perMonth[i] || { c: 0, t: 0 };\n    const accuracy = s.t > 0 ? s.c / s.t : null;\n    let h = '';\n    if (accuracy === null) h = '';\n    else if (accuracy < 0.4) h = 'h0';\n    else if (accuracy < 0.6) h = 'h1';\n    else if (accuracy < 0.75) h = 'h2';\n    else if (accuracy < 0.9) h = 'h3';\n    else h = 'h4';\n    if (h) cell.classList.add(h);\n    cell.innerHTML = `<div>${MONTHS[i-1].slice(0,3)}<\u002Fdiv><div class=\"pct\">${accuracy === null ? '—' : Math.round(accuracy*100) + '%'}<\u002Fdiv>`;\n    map.appendChild(cell);\n  }\n}\n\nfunction resetStats() {\n  if (!confirm('¿Reiniciar todas las estadísticas? Las misiones completadas se mantienen.')) return;\n  state.totals = { correct: 0, total: 0, bestStreak: 0, totalTime: 0 };\n  state.perMonth = {};\n  state.currentStreak = 0;\n  state.xp = state.missionsComplete.length * 50;\n  state.level = Math.floor(state.xp / 100);\n  saveState();\n  refreshStats();\n  refreshXP();\n  toast('Estadísticas reiniciadas', 'success');\n}\n\n/* INIT */\nbuildDayGrid();\nrefreshXP();\nrefreshStreakDisplay();\n\n/* SUMI OVERRIDES */\nbuildDayGrid = function() {\n  const grid = document.getElementById('day-grid');\n  if (!grid) return;\n  grid.innerHTML = '';\n  for (let i = 0; i < 7; i++) {\n    const b = document.createElement('button');\n    b.className = 'day-btn';\n    b.dataset.num = String(i).padStart(2, '0');\n    b.dataset.day = i;\n    b.innerHTML = `<span class=\"lbl\">${DAYS[i]}<\u002Fspan>`;\n    b.addEventListener('click', () => submitAnswer(i));\n    grid.appendChild(b);\n  }\n};\nbuildDayGrid();\n\nrefreshStats = function() {\n  const total = state.totals.total;\n  const correct = state.totals.correct;\n  const pct = total ? Math.round(correct / total * 100) : null;\n  const stPct = document.getElementById('st-pct');\n  if (stPct) stPct.innerHTML = pct === null ? '\\u2014' : pct + '<span class=\"pct-symbol\">%<\u002Fspan>';\n  document.getElementById('st-correct').textContent = correct;\n  document.getElementById('st-streak').textContent = state.totals.bestStreak;\n  const avgEl = document.getElementById('st-time');\n  if (avgEl) {\n    if (total) {\n      avgEl.innerHTML = (state.totals.totalTime / total).toFixed(1) + '<span class=\"unit\">s<\u002Fspan>';\n    } else avgEl.textContent = '\\u2014';\n  }\n  const ledger = document.getElementById('ledger');\n  if (!ledger) return;\n  ledger.innerHTML = '';\n  let weakest = -1, weakestAcc = 1.01;\n  for (let i = 1; i <= 12; i++) {\n    const s = state.perMonth[i];\n    if (s && s.t >= 3) {\n      const a = s.c / s.t;\n      if (a < weakestAcc) { weakestAcc = a; weakest = i; }\n    }\n  }\n  for (let i = 1; i <= 12; i++) {\n    const s = state.perMonth[i] || { c: 0, t: 0 };\n    const acc = s.t > 0 ? s.c / s.t : null;\n    const row = document.createElement('div');\n    row.className = 'ledger-row';\n    if (acc === null) row.classList.add('empty');\n    if (i === weakest) row.classList.add('weak');\n    const widthPct = acc === null ? 8 : Math.max(4, Math.round(acc * 100));\n    row.innerHTML = `<div class=\"l-month\">${MONTHS[i-1].slice(0,3)}<\u002Fdiv><div class=\"l-bar-wrap\"><div class=\"l-bar-track\"><\u002Fdiv><div class=\"l-bar\" style=\"width:${widthPct}%\"><\u002Fdiv><\u002Fdiv><div class=\"l-pct\">${acc === null ? '\\u2014' : Math.round(acc*100) + '%'}<\u002Fdiv>`;\n    ledger.appendChild(row);\n  }\n  const note = document.getElementById('stats-note');\n  if (note) {\n    if (total === 0) note.innerHTML = 'A\\u00fan no hay tinta en el papel. <em>Visita el Dojo<\u002Fem> para empezar.';\n    else if (weakest > 0) note.innerHTML = `Donde la tinta se vuelve <em>bermell\\u00f3n<\u002Fem> \\u2014 ${MONTHS[weakest-1]} \\u2014 ah\\u00ed est\\u00e1 tu pr\\u00f3ximo entrenamiento.`;\n    else note.innerHTML = 'Equilibrio sereno entre los doce meses. <em>Sigue puliendo el filo.<\u002Fem>';\n  }\n};\n\n/* TWEAKS — dark/light only */\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"theme\": \"day\"\n}/*EDITMODE-END*/;\nlet tweaks = (() => {\n  try { return { ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem('sumi_tweaks') || '{}')) }; }\n  catch (e) { return { ...TWEAK_DEFAULTS }; }\n})();\nfunction applyTweaks() {\n  document.documentElement.setAttribute('data-theme', tweaks.theme);\n  const tc = document.querySelector('meta[name=\"theme-color\"]');\n  if (tc) tc.setAttribute('content', tweaks.theme === 'night' ? '#14110d' : '#f3eee2');\n  localStorage.setItem('sumi_tweaks', JSON.stringify(tweaks));\n  document.querySelectorAll('.tw-opt').forEach(l => l.classList.toggle('active', l.dataset.theme === tweaks.theme));\n}\nfunction setTweak(key, val) {\n  tweaks[key] = val; applyTweaks();\n  try { window.parent.postMessage({type: '__edit_mode_set_keys', edits: { [key]: val }}, '*'); } catch (e) {}\n}\napplyTweaks();\nwindow.addEventListener('message', (ev) => {\n  if (!ev.data) return;\n  if (ev.data.type === '__activate_edit_mode') showTweaks(true);\n  if (ev.data.type === '__deactivate_edit_mode') showTweaks(false);\n});\nfunction showTweaks(on) {\n  const p = document.getElementById('tweaks-panel');\n  if (p) p.style.display = on ? 'block' : 'none';\n}\ntry { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(e) {}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
